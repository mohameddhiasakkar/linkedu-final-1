<div class="student-quiz-page">
  <header class="header">
    <h2>Student Quiz</h2>
    <div class="quiz-picker">
      <label for="quizId">Quiz</label>
      <select id="quizId" [(ngModel)]="selectedQuizId" (change)="loadQuestions()">
        <option *ngFor="let quiz of quizzes" [ngValue]="quiz.id">
          #{{ quiz.id }} - {{ quiz.title }}
        </option>
      </select>
    </div>
  </header>

  <div class="status" *ngIf="isLoadingQuizzes">Loading quizzes…</div>
  <div class="status" *ngIf="isLoadingQuestions">Loading questions…</div>
  <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>
  <div class="status success" *ngIf="message">{{ message }}</div>

  <form *ngIf="questions.length > 0" class="quiz-form" (ngSubmit)="submitQuiz()">
    <article class="question-card" *ngFor="let q of questions; let i = index">
      <h3>Q{{ i + 1 }}. {{ q.questionText }}</h3>

      <label class="answer-option" *ngIf="q.optionA">
        <input type="radio" [name]="'q-' + q.id" [value]="'A'" [(ngModel)]="answersByQuestionId[q.id]" />
        <span>A) {{ q.optionA }}</span>
      </label>
      <label class="answer-option" *ngIf="q.optionB">
        <input type="radio" [name]="'q-' + q.id" [value]="'B'" [(ngModel)]="answersByQuestionId[q.id]" />
        <span>B) {{ q.optionB }}</span>
      </label>
      <label class="answer-option" *ngIf="q.optionC">
        <input type="radio" [name]="'q-' + q.id" [value]="'C'" [(ngModel)]="answersByQuestionId[q.id]" />
        <span>C) {{ q.optionC }}</span>
      </label>
      <label class="answer-option" *ngIf="q.optionD">
        <input type="radio" [name]="'q-' + q.id" [value]="'D'" [(ngModel)]="answersByQuestionId[q.id]" />
        <span>D) {{ q.optionD }}</span>
      </label>
    </article>

    <button class="submit-btn" type="submit" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Submitting...' : 'Submit Quiz' }}
    </button>
  </form>
</div>
