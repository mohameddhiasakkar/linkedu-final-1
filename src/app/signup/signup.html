<div class="flex items-center justify-center min-h-screen bg-gray-100">
  <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-center text-gray-900">Sign up</h2>
    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-2 gap-3">
        <input name="firstName" [(ngModel)]="form.firstName" placeholder="First name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
        <input name="lastName" [(ngModel)]="form.lastName" placeholder="Last name" required
               class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
      </div>

      <input name="email" type="email" [(ngModel)]="form.email" placeholder="Email" required
             class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />

      <input name="password" type="password" [(ngModel)]="form.password" placeholder="Password" required
             class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />

      <select name="role" [(ngModel)]="form.role"
              class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        <option value="STUDENT">Student</option>
        <option value="AGENT">Agent</option>
        <option value="ADMIN">Admin</option>
      </select>

      <p *ngIf="errorMessage" class="text-sm text-red-600">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="text-sm text-green-600">{{ successMessage }}</p>

      <button type="submit" [disabled]="isSubmitting"
              class="w-full px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-transparent rounded-md shadow-sm hover:bg-blue-700">
        {{ isSubmitting ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="text-sm text-center text-gray-600">
      Already have an account?
      <a href="/login" class="font-medium text-blue-600 hover:text-blue-500">Login</a>
    </p>
  </div>
</div>
