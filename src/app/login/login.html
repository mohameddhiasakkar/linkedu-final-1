<div class="login-page">
  <div class="login-card">

    <!-- Accent bar -->
    <div class="card-accent-bar"></div>

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-icon">
        <svg width="32" height="32" fill="none" stroke="white" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 14l9-5-9-5-9 5 9 5z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 14l6.16-3.422A12.083 12.083 0 0112 21a12.083 12.083 0 01-6.16-10.422L12 14z"/>
        </svg>
      </div>
      <h2>Welcome Back!</h2>
      <p>Sign in to continue your journey</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
          </svg>
          <input class="form-input" id="email" name="email" type="email"
            [(ngModel)]="form.email" placeholder="you@example.com" required />
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input class="form-input" id="password" name="password" type="password"
            [(ngModel)]="form.password" placeholder="••••••••" required />
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-message">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn" [disabled]="isSubmitting">
        <span>
          <svg *ngIf="isSubmitting" class="spin" width="18" height="18" fill="none"
            stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          {{ isSubmitting ? 'Signing in...' : 'Login' }}
        </span>
      </button>

      <!-- Footer links -->
      <div class="form-footer" style="margin-top: 1rem;">
        <a href="#" class="link-blue">Forgot password?</a>
        <a routerLink="/signup" class="link-yellow">Create account</a>
      </div>

    </form>
  </div>
</div>
